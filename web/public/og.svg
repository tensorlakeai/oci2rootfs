      <rect x="70"  y="-72"  width="6" height="144" rx="3"/>
      <rect x="84"  y="-50"  width="6" height="100" rx="3"/>
      <rect x="98"  y="-30"  width="6" height="60"  rx="3"/>
      <rect x="112" y="-44"  width="6" height="88"  rx="3"/>
      <rect x="126" y="-66"  width="6" height="132" rx="3"/>
      <rect x="140" y="-94"  width="6" height="188" rx="3"/>
      <rect x="154" y="-120" width="6" height="240" rx="3"/>
