  <!-- main copy -->
  <text x="96" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="84" fill="#e9ece9" letter-spacing="-2">Hear them,</text>
  <text x="96" y="332" font-family="Georgia, 'Times New Roman', serif" font-size="84" fill="#a4afa7" letter-spacing="-2">not a translator.</text>

  <!-- subtitle -->
  <text x="96" y="510" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#a4afa7">Real-time interpretation that sounds like the actual person speaking.</text>
  <text x="96" y="546" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#a4afa7">Their voice, your language. Sub-second latency.</text>
