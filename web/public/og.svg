<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="g1" cx="15%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#1f3a2c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d1410" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="100%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#7ab895" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0d1410" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#7ab895" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#7ab895" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0d1410"/>
